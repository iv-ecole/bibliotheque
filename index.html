<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bibliothèque IVA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
max-width:800px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

li{
background:#1e293b;
margin:10px 0;
padding:15px;
border-radius:8px;
list-style:none;
}

.small{
width:auto;
margin-right:5px;
padding:5px 10px;
}

.dispo{
color:#22c55e;
font-weight:bold;
}

.emprunte{
color:#ef4444;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Bibliothèque IVA</h1>

<h2>Ajouter un livre</h2>

<input id="numero" placeholder="Numéro">
<input id="titre" placeholder="Titre">
<input id="auteur" placeholder="Auteur">
<input id="annee" placeholder="Année">
<input id="edition" placeholder="Edition">
<input id="langue" placeholder="Langue">
<input id="emplacement" placeholder="Emplacement">
<input id="code" placeholder="Code secret">

<button onclick="ajouterLivre()">Ajouter</button>

<h2>Recherche</h2>

<input id="recherche" placeholder="Titre ou auteur" oninput="afficherLivres()">

<h2>Livres</h2>

<ul id="liste"></ul>

<script>

const SUPABASE_URL="https://dihnpkihprrwmpknbkqp.supabase.co"
const SUPABASE_KEY="sb_publishable_9JF-3zXcuw6zJGqq-SReQw_sF4dlsKL"

const { createClient } = supabase
const db = createClient(SUPABASE_URL,SUPABASE_KEY)

let livres=[]
const codeSecret="1215"

async function chargerLivres(){

const { data, error } = await db
.from("livres")
.select("*")
.order("id",{ascending:true})

if(error){
console.error(error)
return
}

livres=data
afficherLivres()

}

function afficherLivres(){

const liste=document.getElementById("liste")
const filtre=document.getElementById("recherche").value.toLowerCase()

liste.innerHTML=""

livres.forEach(livre=>{

if(
livre.titre?.toLowerCase().includes(filtre) ||
livre.auteur?.toLowerCase().includes(filtre) ||
livre.numero?.toLowerCase().includes(filtre)
){

let li=document.createElement("li")

li.innerHTML=`

<b>${livre.numero} - ${livre.titre}</b><br>
${livre.auteur} | ${livre.annee} | ${livre.edition}<br>
Langue: ${livre.langue}<br>
Emplacement: ${livre.emplacement}<br>

<span class="${livre.statut==='Disponible'?'dispo':'emprunte'}">
${livre.statut}
</span>

<br><br>

${livre.statut==="Disponible"
?`<button class="small" onclick="emprunter(${livre.id})">Emprunter</button>`
:`<button class="small" onclick="rendre(${livre.id})">Rendre</button>`
}

<button class="small" onclick="supprimer(${livre.id})">Supprimer</button>

`

liste.appendChild(li)

}

})

}

async function ajouterLivre(){

const num=document.getElementById("numero").value
const titre=document.getElementById("titre").value
const auteur=document.getElementById("auteur").value
const annee=document.getElementById("annee").value
const edition=document.getElementById("edition").value
const langue=document.getElementById("langue").value
const emplacement=document.getElementById("emplacement").value
const code=document.getElementById("code").value

if(code!==codeSecret){
alert("Code incorrect")
return
}

await db.from("livres").insert([{

numero:num,
titre:titre,
auteur:auteur,
annee:annee,
edition:edition,
langue:langue,
emplacement:emplacement,
statut:"Disponible",
empruntePar:"",
retour:""

}])

chargerLivres()

}

async function emprunter(id){

const nom=prompt("Nom de l'emprunteur")
const date=prompt("Date de retour (AAAA-MM-JJ)")

if(!nom||!date) return

await db.from("livres")
.update({

statut:"Emprunté",
empruntePar:nom,
retour:date

})
.eq("id",id)

chargerLivres()

}

async function rendre(id){

await db.from("livres")
.update({

statut:"Disponible",
empruntePar:"",
retour:""

})
.eq("id",id)

chargerLivres()

}

async function supprimer(id){

if(!confirm("Supprimer ce livre ?")) return

await db.from("livres")
.delete()
.eq("id",id)

chargerLivres()

}

chargerLivres()

</script>

</body>
</html>
